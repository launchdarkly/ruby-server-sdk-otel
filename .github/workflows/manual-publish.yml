name: Publish Package
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Is this a dry run. If so no package will be published.'
        type: boolean
        required: true
      tag:
        description: 'Tag of an existing draft release to upload artifacts to.'
        type: string
        required: false
      publish_release:
        description: 'Publish (un-draft) the release after all artifacts are uploaded?'
        type: boolean
        required: false
        default: true

jobs:
  build-publish:
    runs-on: ubuntu-latest
    # Needed to get tokens during publishing.
    permissions:
      id-token: write
      contents: read
      attestations: write # Needed for actions/attest
    outputs:
      gem-hash: ${{ steps.publish.outputs.gem-hash}}
    steps:
      - uses: actions/checkout@v4

      - uses: launchdarkly/gh-actions/actions/release-secrets@release-secrets-v1.2.0
        name: 'Get rubygems API key'
        with:
          aws_assume_role: ${{ vars.AWS_ROLE_ARN }}
          ssm_parameter_pairs: '/production/common/releasing/rubygems/api_key = GEM_HOST_API_KEY'

      - id: build-and-test
        name: Build and Test
        uses: ./.github/actions/ci
        with:
          ruby-version: 3.0

      - id: publish
        name: Publish Package
        uses: ./.github/actions/publish
        with:
          dry_run: ${{ inputs.dry_run }}

      - name: Generate checksums file
        if: ${{ !inputs.dry_run }}
        env:
          HASHES: ${{ steps.publish.outputs.gem-hash }}
        run: |
          echo "$HASHES" | base64 -d > checksums.txt

      - name: Attest build provenance
        if: ${{ !inputs.dry_run }}
        uses: actions/attest@v4
        with:
          subject-checksums: checksums.txt

  publish-release:
    needs: ['build-publish']
    if: ${{ !inputs.dry_run && inputs.publish_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag }}
        run: >
          gh release edit "$TAG_NAME"
          --repo ${{ github.repository }}
          --draft=false
